repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.15
    hooks:
      # Run the formatter first — reformats files in place
      - id: ruff-format
        name: ruff format
        types_or: [python, pyi]

      # Then run the linter — fails on any remaining violations
      - id: ruff
        name: ruff check
        types_or: [python, pyi]
        args: [--fix, --exit-non-zero-on-fix]
