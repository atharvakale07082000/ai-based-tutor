[project]
name = "ai-tutor"
version = "1.0.0"
description = "Multi-agent AI tutoring platform with LangGraph + Hugging Face"
requires-python = ">=3.13"
dependencies = [
    "fastapi==0.115.0",
    "uvicorn[standard]==0.30.6",
    "sqlalchemy[asyncio]==2.0.36",
    "alembic==1.13.3",
    "aiosqlite==0.20.0",
    "asyncpg>=0.30",
    "redis==5.2.0",
    "celery==5.4.0",
    "flower==2.0.1",
    "langgraph>=0.2.60,<0.3",
    "langchain>=0.3.13,<0.4",
    "langchain-core>=0.3.40,<0.4",
    "huggingface-hub>=0.26.2",
    "python-jose[cryptography]==3.3.0",
    "bcrypt>=4.2",
    "python-multipart==0.0.12",
    "structlog==24.4.0",
    "tenacity==9.0.0",
    "python-socketio==5.11.4",
    "httpx==0.27.2",
    "pydantic[email]==2.9.2",
    "pydantic-settings==2.6.0",
    "python-dotenv==1.0.1",
    "numpy>=2.0",
    "langfuse>=2.0",
    "motor>=3.6",
    "pyyaml>=6.0",
]

[dependency-groups]
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
