services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    command: uvicorn app.main:socket_app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      # The app's datastore is MongoDB (see app/db/mongo.py). This points the container at the
      # local `mongo` service; remove it to use the MONGO_URL from .env (e.g. Atlas) instead.
      MONGO_URL: mongodb://mongo:27017
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      PISTON_BASE_URL: http://piston:2000
    env_file:
      - .env
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app

  celery_worker:
    build: .
    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=info --concurrency=4
    environment:
      MONGO_URL: mongodb://mongo:27017
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    env_file:
      - .env
    depends_on:
      - redis
      - mongo
    volumes:
      - .:/app

  celery_beat:
    build: .
    command: celery -A app.tasks.celery_app.celery_app beat --loglevel=info
    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - .:/app

  flower:
    build: .
    command: celery -A app.tasks.celery_app.celery_app flower --port=5555
    ports:
      - "5555:5555"
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      - redis
    volumes:
      - .:/app

  # Sandboxed multi-language code execution for the interview compiler.
  # After `docker compose up`, install language packs once: `bash scripts/piston_install.sh`.
  piston:
    image: ghcr.io/engineer-man/piston:latest
    privileged: true            # required by Piston's isolate sandbox
    ports:
      - "2000:2000"
    volumes:
      - piston_data:/piston/packages
    tmpfs:
      - /tmp:exec

volumes:
  mongo_data:
  redis_data:
  piston_data:
